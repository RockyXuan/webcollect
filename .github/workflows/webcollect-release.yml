name: WebCollect Chrome Extension Tag Verification

on:
  push:
    tags:
      - "webcollect-*"

permissions:
  contents: read

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify auth contract
        run: node scripts/check-auth-contracts.mjs

      - name: Build Chrome extension
        run: pnpm build:ext

      - name: Verify Chrome extension artifact
        run: pnpm test:extension-artifact

      - name: Verify Chrome extension package size
        run: pnpm test:extension-size
