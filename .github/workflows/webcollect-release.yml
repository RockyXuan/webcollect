name: WebCollect Chrome Extension Tag Verification

on:
  push:
    tags:
      - "webcollect-*"

permissions:
  contents: write

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.8.2

      - name: Verify smart-search Edge Function
        run: pnpm check:edge

      - name: Audit production dependencies
        run: pnpm audit:prod

      - name: Verify auth contract
        run: node scripts/check-auth-contracts.mjs

      - name: Build Chrome extension
        run: pnpm build:ext

      - name: Verify Chrome extension artifact
        run: pnpm test:extension-artifact

      - name: Verify Chrome extension package size
        run: pnpm test:extension-size

      - name: Package Chrome extension
        id: package
        shell: bash
        run: |
          set -Eeuo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^webcollect-([0-9]{4}-[0-9]{2}-[0-9]{2})-(.+)$ ]]; then
            echo "Unsupported release tag: ${tag}" >&2
            exit 1
          fi

          release_date="${BASH_REMATCH[1]}"
          version_label="${BASH_REMATCH[2]}"
          zip_name="WebCollect-Chrome-Extension-${version_label}-${release_date}.zip"

          (cd extension/dist && zip -qr "${GITHUB_WORKSPACE}/${zip_name}" .)
          echo "zip_name=${zip_name}" >> "${GITHUB_OUTPUT}"
          echo "version_label=${version_label}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ZIP_NAME: ${{ steps.package.outputs.zip_name }}
          VERSION_LABEL: ${{ steps.package.outputs.version_label }}
        run: |
          set -Eeuo pipefail

          release_flags=()
          if [[ "${GITHUB_REF_NAME}" =~ -rc\.[1-9][0-9]*$ ]]; then
            release_flags+=(--prerelease)
          fi

          notes=(
            "WebCollect Chrome extension ${VERSION_LABEL}."
            ""
            "- Keeps the Google sign-in label on one line at compact desktop widths."
            "- Moves the action toolbar to a dedicated responsive row before it can overlap the search engine or cloud-sync badge."
            "- Covers the signed-in sync geometry at 1366, 1536, 1728, 1800, and 2048 pixel desktop widths."
            "- Preserves collection data, sync state, snapshots, Chrome storage, and Supabase schema."
            "- Verified by unit, legacy, Playwright, Web build, extension artifact, size, and production dependency checks."
          )
          printf '%s\n' "${notes[@]}" > release-notes.md

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${ZIP_NAME}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${ZIP_NAME}" \
              --title "WebCollect ${VERSION_LABEL}" \
              --notes-file release-notes.md \
              "${release_flags[@]}"
          fi
