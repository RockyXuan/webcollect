name: WebCollect Chrome Extension Release

on:
  push:
    tags:
      - "webcollect-*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify auth contract
        run: node scripts/check-auth-contracts.mjs

      - name: Build Chrome extension
        run: pnpm build:ext

      - name: Package extension
        run: |
          cd extension/dist
          zip -r ../../WebCollect-Latest-${{ github.ref_name }}.zip .

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: WebCollect Latest ${{ github.ref_name }}
          body: |
            WebCollect 最新 Chrome 扩展测试包。

            本版本由 GitHub Actions 自动从主线构建，包含当前最新代码。下载 zip 后解压，在 Chrome 扩展页加载解压后的文件夹即可测试。
          files: WebCollect-Latest-${{ github.ref_name }}.zip
