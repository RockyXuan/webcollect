name: WebCollect Chrome Extension Release

on:
  push:
    tags:
      - "webcollect-*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify auth contract
        run: node scripts/check-auth-contracts.mjs

      - name: Build Chrome extension
        run: pnpm build:ext

      - name: Verify Chrome extension artifact
        run: pnpm test:extension-artifact

      - name: Package extension
        run: |
          cd extension/dist
          zip -r ../../WebCollect-Chrome-Extension-${{ github.ref_name }}.zip .

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: WebCollect Latest ${{ github.ref_name }}
          body: |
            WebCollect 最新测试包。

            Chrome 扩展请下载：WebCollect-Chrome-Extension-${{ github.ref_name }}.zip。
            GitHub 自动附带的 Source code (zip/tar.gz) 是完整源码包，不是 Chrome 可直接加载的扩展目录。

            使用方法：下载 Chrome 扩展 zip 后先解压，再在 Chrome 扩展程序页面选择“加载已解压的扩展程序”，加载解压后的文件夹。
          files: WebCollect-Chrome-Extension-${{ github.ref_name }}.zip
