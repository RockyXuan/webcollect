name: WebCollect CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit-production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup audit Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --registry=https://registry.npmjs.org

      - name: Audit production dependencies
        run: pnpm audit:prod

  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --registry=https://registry.npmjs.org

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.8.2

      - name: Verify smart-search Edge Function
        run: pnpm check:edge

      - name: Type check
        run: pnpm ts-check

      - name: Lint
        run: pnpm lint

      - name: Run behavioral tests
        run: pnpm test

      - name: Run script tests
        run: pnpm test:legacy

      - name: Build Web app
        run: pnpm build

      - name: Build Chrome extension
        run: pnpm build:ext

      - name: Verify Chrome extension artifact
        run: pnpm test:extension-artifact

      - name: Verify Chrome extension package size
        run: pnpm test:extension-size

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run browser regression tests
        run: pnpm test:e2e
